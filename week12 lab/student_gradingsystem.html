<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grading System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bundle.min.js"></script>
</head>
 
<body>
    <form>
        <div class="container-fluid" style="background-color: rgb(200, 110, 0);">
            <h1 class="text-center">Student Grading System</h1>
        </div>
        <div class="container-fluid" style="background-color: bisque; width: 80%;">
            <div class="row">
                <div class="col-md-2 p-3 text-dark" style="text-align: center;">
                    <label for="name">Student Name:</label>
                    <input type="text" id="name" name="name"><br><br> 
                </div>
                <div class="col-md-2 p-3 text-dark" style="text-align: center;">
                    <label for="Student ID">Student ID:</label> 
                    <input type="text" id="studentID" name="studentID"><br><br>
                </div>
                <div class="col-md-2 p-3 text-dark" style="text-align: center;">
                    <label for="course1">BACT7507 Marks:</label> 
                    <input type="text" id="course1" name="course1"><br><br>
                </div>
                <div class="col-md-2 p-3 text-dark" style="text-align: center;">
                    <label for="course2">BACT7503 Marks:</label> 
                    <input type="text" id="course2" name="course2"><br><br>
                </div>
                <div class="col-md-2 p-3 text-dark" style="text-align: center;">
                    <label for="course3">BACT7501Marks:</label> 
                    <input type="text" id="course3" name="course3"><br><br>
                </div>
            </div>
            <div class="row- md-3 p-2" style="text-align: center;">
                <div class="col p-2" style="text-align: center;">
                    <input type="button" value="Calculate Result" onclick="checkGrade()" class="btn btn-primary">
                </div>
                <div class="col p-2" style="text-align: center;">
                    <input type="reset" value="Reset" class="btn btn-secondary">
                </div>
            </div>
        </div>
        <div class="container-fluid mt-3" style="color: rgb(255, 255, 255); background-color: rgb(240, 8, 8); width: 70%;">
            <h5 class="print">Student Name: <span id="studentName"></span></h5>
            <h5 class="print">Student ID: <span id="studentIDResult"></span></h5>
            <h5 class="print">Your Grade is: <span id="subjectGrade"></span></h5>
            <h5 class="print">Total Marks: <span id="totalmarks"></span></h5>
            <h5 class="print">Percentage: <span id="percentage"></span></h5>
            <h5 class="print">Status: <span id="status"></span></h5>
        </div>
    </form>
</body>
<script>
        function checkGrade() {
            let course1 = parseInt(document.getElementById("course1").value);
            let course2 = parseInt(document.getElementById("course2").value);
            let course3 = parseInt(document.getElementById("course3").value);
            let studentName = document.getElementById("name").value;
            let studentID = document.getElementById("studentID").value;
            let message = "";
            let totalMarks = course1 + course2 + course3;
            let percentage = (totalMarks / 300) * 100;

            if (percentage >= 90) {
                message = "A+";
            } else if (percentage >= 80) {
                message = "A";
            } else if (percentage >= 70) {
                message = "B";
            } else if (percentage >= 60) {
                message = "C";
            } else if (percentage >= 50) {
                message = "D";
            } else if (percentage >= 40) {
                message = "E";
            } else if (percentage < 40) {
                message = "U";
            }
            if (percentage >= 50) {
                document.getElementById("status").innerText = "Status: Pass";
            } else {
                document.getElementById("status").innerText = "Status: Fail";
            }
            document.getElementById("subjectGrade").innerText = message;
            document.getElementById("studentName").innerText = studentName;
            document.getElementById("studentIDResult").innerText = studentID;
            document.getElementById("totalmarks").innerText = "Total Marks: " + totalMarks;
            document.getElementById("percentage").innerText = "Percentage: " + percentage + "%";
        }
</script>

</html>
