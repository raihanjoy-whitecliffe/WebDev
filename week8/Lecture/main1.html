<!Doctype html>
<head>
    <title> Image Slider</title>
    <link rel="stylesheet" href="main1.css">
</head>
<body>
    <div class="slider">
        <input type="radio" name="slider" id="slide1"checked>
        <input type="radio" name="slider" id="slide2">
        <input type="radio" name="slider" id="slide3">
        <div class="slide-group">
            <div class="slide">
                <img src="https://picsum.photos/seed/picsum/600/300" alt="Slide 1">
            </div>
            <div class="slide">
                <img src="https://picsum.photos/id/28/600/300?blur(.2)" alt="Slide 2">
            </div>
            <div class="slide">
                <img src="https://picsum.photos/id/29/600/300" alt="Slide 3">
            </div>
        </div>
        <label for="slide1"> Slide 1</label>
        <label for="slide2"> Slide 2</label>
        <label for="slide3"> Slide 3</label>
    </div>
</body>
</html>
