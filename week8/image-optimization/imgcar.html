<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Optimization</title>
    <link rel="stylesheet" href="imgcar.css">
</head>
<!Doctype html>
<body>
    <div class="carousel">
        <input type="radio" name="carousel" id="slide1" checked>
        <input type="radio" name="carousel" id="slide2">
        <input type="radio" name="carousel" id="slide3">
        <input type="radio" name="carousel" id="slide4">
    <div class="carousel-slides">
        <div class="carousel-slide">
            <img src="images/clay-banks-tA2lrWRgoRQ-unsplash.webp" alt="Slide 1">
        </div>
        <div class="carousel-slide">
            <img src="images/hansjorg-rath-LUcSA_woHGg-unsplash.webp" alt="Slide 2">
        </div>
        <div class="carousel-slide">
            <img src="images/mohammadreza-charkhgard-UkMyEzJvNnk-unsplash.webp" alt="Slide 3">
        </div>
        <div class="carousel-slide">
            <img src="images/philippe-bontemps-p1B68YsOZuk-unsplash.webp" alt="Slide 4">
        </div>
    </div>

    <div class="carousel-nav">
        <label for="slide1" class="nav-dot"></label>
        <label for="slide2" class="nav-dot"></label>
        <label for="slide3" class="nav-dot"></label>
        <label for="slide4" class="nav-dot"></label>
    </div>
</div>
</body>
