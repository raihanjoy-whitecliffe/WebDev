<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Ternary Operators Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
 
<body>
    <div class="container mt-5">
        <h1>JavaScript Ternary Operators Example</h1>
        <div class="card">
            <div class="card-body">
                
                <h2>Ternary Operators</h2>
                <p class="mb-3">Enter your age:</p>
                <input type="number" id="ageInput" class="form-control mb-3">
                <button onclick="checkAge()" class="btn btn-primary">Check</button>
                <p id="resultTernary"></p>
                
                <h2>Grade Checker</h2>
                <p class="mb-3">Enter your score:</p>
                <input type="number" id="scoreInput" class="form-control mb-3">
                <button onclick="checkGrade()" class="btn btn-secondary">Check Grade</button>
                <p id="resultGrade"></p>
                
                <h2>Nested Ternary Operators</h2>
                <p class="mb-3">Enter a number:</p>
                <input type="number" id="numberInput" class="form-control mb-3">
                <button onclick="checkNumber()" class="btn btn-success">Check</button>
                <p id="resultNested"></p>
 
                <h2>Guard Clause</h2>
                <p class="mb-3">Enter a name:</p>
                <input type="text" id="nameInput" class="form-control mb-3">
                <button onclick="greetUser()" class="btn btn-warning">Greet</button>
                <p id="resultGuard"></p>
            </div>
        </div>
    </div>
 
    <script>
        /*1. Ternary Operator: The checkAge() function checks the entered age and displays a message
        using a ternary operator to determine if the person is eligible to vote.
        2. Nested Ternary Operators: The checkNumber() function checks the entered number and displays
        a message using nested ternary operators to determine if the number is positive, negative, or zero.
        3. The "Guard Clause" section demonstrates the use of a guard clause to check if a name is entered.
        If the name is not provided, it displays a message asking the user to enter a name.  */
 
        // Ternary Operator
        function checkAge() {
            let age = parseInt(document.getElementById("ageInput").value);
            let message = (age >= 18) ? "You are eligible to vote." : "You are not eligible to vote.";
            document.getElementById("resultTernary").innerText = message;
        }

        //grade checker
        function checkGrade() {
            let score = parseInt(document.getElementById("scoreInput").value);
            let message = 
                (score >= 90)
                        ? "A*"
                        : (score >= 80) 
                            ? "A" 
                            : (score >= 70)
                                ? "B"
                                : (score >= 60) 
                                    ? "C"
                                    : (score >= 50) 
                                        ? "D" 
                                        : "F";
            document.getElementById("resultGrade").innerText = `Your grade is: ${message}`;
        }
        // Nested Ternary Operators
        function checkNumber() {
            let number = parseInt(document.getElementById("numberInput").value);
            let message =
                (number > 0)
                    ? "Positive"
                    : (number < 0)
                        ? "Negative"
                        : "Zero";
            document.getElementById("resultNested").innerText = message;
        }
 
        // Guard Clause
        function greetUser() {
            let name = document.getElementById("nameInput").value;
            if (!name) {
                document.getElementById("resultGuard").innerText = "Please enter a name.";
                return;
            }
            let message = `Hello, ${name}!`;
            document.getElementById("resultGuard").innerText = message;
        }
    </script>
</body>
 
</html>
