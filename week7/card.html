<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>Timetable using Cards & Grid</title>
  <link rel="stylesheet" href="card.css">
</head>
<body>
 
<h1 class="title"> My Weekly Timetable</h1>
 
<div class="timetable-container">
 
 
  <div class="day-card">
    <h2>Monday</h2>
    <div class="card">9:00 - Math</div>
    <div class="card">10:00 - Science</div>
    <div class="card">11:00 - Computer</div>
  </div>
 
 
  <div class="day-card">
    <h2>Tuesday</h2>
    <div class="card">9:00 - English</div>
    <div class="card">10:00 - Math</div>
    <div class="card">11:00 - PE</div>
  </div>
 
 
  <div class="day-card">
    <h2>Wednesday</h2>
    <div class="card">9:00 - History</div>
    <div class="card">10:00 - Science</div>
    <div class="card">11:00 - Music</div>
  </div>
 
 
  <div class="day-card">
    <h2>Thursday</h2>
    <div class="card">9:00 - Art</div>
    <div class="card">10:00 - Computer</div>
    <div class="card">11:00 - Math</div>
  </div>
 
</div>
 
</body>
</html>
