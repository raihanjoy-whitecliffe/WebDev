<!DOCTYPE html>
<head>
    <title>Timetable using grid</title>
     <link rel="stylesheet" href="grid-layout.css">
</head>
<body>
    <h1 class="title">My Weekly Timetable</h1>
    <div class="timetable">
        <!--Head Row-->
        <div class="cell header">Time</div>
        <div class="cell header">Mon</div>
        <div class="cell header">Tue</div>
        <div class="cell header">Wed</div>
        <div class="cell header">Thu</div>
        <!---R1--->
        <div class="cell time">09:00</div>
        <div class="cell math">Math</div>
        <div class="cell sci">Science</div>
        <div class="cell comp">Computer</div>
        <div class="cell pe">PE</div>
        <!---R2--->
        <div class="cell time">10:00</div>
        <div class="cell geo">Geography</div>
        <div class="cell lang">Language</div>
        <div class="cell fmw">Finding My Way</div>
        <div class="cell spo">Sports</div>
        <!---R3--->
        <div class="cell time">11:00</div>
        <div class="cell msc">Music</div>
        <div class="cell dnc">Dance</div>
        <div class="cell acc">Accounting</div>
        <div class="cell bus">Business</div>

    </div>
</body>
