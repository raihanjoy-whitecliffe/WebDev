<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables and Data Types</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
 
</head>
 
<body>
    <div class="container mt-5">
        <h1>JavaScript Variables and Data Types</h1>
        <div class="card">
            <div class="card-body">
                <h2>Variable Examples</h2>
                <div class="row">
                    <div class="col-md-6">
                        <h3>String Variable</h3>
                        <p class="mb-0">Name: <span id="name"></span></p>
                    </div>
                    <div class="col-md-6">
                        <h3>Numeric Variable</h3>
                        <p class="mb-0">Age: <span id="age"></span></p>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <h3>Boolean Variable</h3>
                        <p class="mb-0">Is Student: <span id="isStudent"></span></p>
                    </div>
                </div>
            </div>
        </div>
 
        <div class="card mt-5">
            <div class="card-body">
                <h2>Arithmetic Operations</h2>
                <div class="row">
                    <div class="col-md-6">
                        <h3>Addition</h3>
                        <p class="mb-0">Sum: <span id="sum"></span></p>
                    </div>
                    <div class="col-md-6">
                        <h3>Subtraction</h3>
                        <p class="mb-0">Difference: <span id="difference"></span></p>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <h3>Multiplication</h3>
                        <p class="mb-0">Product: <span id="product"></span></p>
                    </div>
                    <div class="col-md-6">
                        <h3>Division</h3>
                        <p class="mb-0">Quotient: <span id="quotient"></span></p>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <h3>Remainder</h3>
                        <p class="mb-0">Remainder: <span id="remainder"></span></p>
                    </div>                    
                </div>
            </div>
        </div>
    </div>
 
    <script>
        // Variable declaration and initialization
        let name = "John";
        const age = 25;
        var isStudent = true;
 
        // Arithmetic operations
        let num1 = 31;
        let num2 = 6;
        let sum = num1 + num2;
        let difference = num1 - num2;
        let product = num1 * num2;
        let quotient = num1 / num2;
        let remainder = num1 % num2; // num1 % num2 gives the remainder of num1 / num2
 
        // Update the values in the HTML
        document.getElementById("name").innerText = name;
        document.getElementById("age").innerText = age;
        document.getElementById("isStudent").innerText = isStudent;
        document.getElementById("sum").innerText = sum;
        document.getElementById("difference").innerText = difference;
        document.getElementById("product").innerText = product;
        document.getElementById("quotient").innerText = quotient;
        document.getElementById("remainder").innerText = remainder;
    </script>
</body>
 
</html>
