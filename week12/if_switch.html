<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Conditional Statements Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
 
<body>
    <div class="container mt-5">
        <h1>JavaScript Conditional Statements Example</h1>
        <div class="card">
            <div class="card-body">
                <h2>If Statement</h2>
                <p class="mb-0">Enter a number:</p>
                <input type="number" id="numberInput" class="form-control mb-3">
                <button onclick="checkNumber()" class="btn btn-primary">Check</button>
                <p id="resultIf"></p>
 
                <h2>If-Else Statement</h2>
                <p class="mb-0">Enter your age:</p>
                <input type="number" id="ageInput" class="form-control mb-3">
                <button onclick="checkAge()" class="btn btn-primary">Check</button>
                <p id="resultIfElse"></p>
 
                <h2>If-Else-If Statement</h2>
                <p class="mb-0">Enter a number:</p>
                <input type="number" id="numberInput2" class="form-control mb-3">
                <button onclick="checkNumber2()" class="btn btn-primary">Check</button>
                <p id="resultIfElseIf"></p>
 
                <h2>Nested If Statement</h2>
                <p class="mb-0">Enter a number:</p>
                <input type="number" id="nestedInput" class="form-control mb-3">
                <button onclick="checkNested()" class="btn btn-primary">Check</button>
                <p id="resultNested"></p>
 
                <h2>Switch Statement</h2>
                <p class="mb-0">Select a day of the week:</p>
                <select id="daySelect" class="form-select mb-3">
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                    <option value="6">Saturday</option>
                    <option value="7">Sunday</option>
                </select>
                <button onclick="checkDay()" class="btn btn-primary">Check</button>
                <p id="resultSwitch"></p>
            </div>
        </div>
    </div>
 
    <script>
        // If Statement
        function checkNumber() {
            let number = parseInt(document.getElementById("numberInput").value);
            let message = "";
 
            if (number > 0) {
                message = "The number is positive.";
            } else if (number < 0) {
                message = "The number is negative.";
            } else {
                message = "The number is zero.";
            }
 
            document.getElementById("resultIf").innerText = message;
        }
 
        // If-Else Statement
        function checkAge() {
            let age = parseInt(document.getElementById("ageInput").value);
            let message = "";
 
            if (age >= 18) {
                message = "You are an adult.";
            } else {
                message = "You are a minor.";
            }
 
            document.getElementById("resultIfElse").innerText = message;
        }
 
        // If-Else-If Statement
        function checkNumber2() {
            let number = parseInt(document.getElementById("numberInput2").value);
            let message = "";
 
            if (number > 0) {
                message = "The number is positive.";
            } else if (number < 0) {
                message = "The number is negative.";
            } else if (number === 0) {
                message = "The number is zero.";
            } else {
                message = "Invalid number.";
            }
 
            document.getElementById("resultIfElseIf").innerText = message;
        }
 
        // Nested If Statement
        function checkNested() {
            let number = parseInt(document.getElementById("nestedInput").value);
            let message = "";
 
            if (number > 0) {
                if (number % 2 === 0) {
                    message = "The number is positive and even.";
                } else {
                    message = "The number is positive and odd.";
                }
            } else {
                message = "The number is either zero or negative.";
            }
 
            document.getElementById("resultNested").innerText = message;
        }
 
        // Switch Statement
        function checkDay() {
            let day = parseInt(document.getElementById("daySelect").value);
            let message = "";
 
            switch (day) {
                case 1:
                    message = "It's Monday.";
                    break;
                case 2:
                    message = "It's Tuesday.";
                    break;
                case 3:
                    message = "It's Wednesday.";
                    break;
                case 4:
                    message = "It's Thursday.";
                    break;
                case 5:
                    message = "It's Friday.";
                    break;
                case 6:
                    message = "It's Saturday.";
                    break;
                case 7:
                    message = "It's Sunday.";
                    break;
                default:
                    message = "Invalid day.";
            }
 
            document.getElementById("resultSwitch").innerText = message;
        }
    </script>
</body>
 
</html>
