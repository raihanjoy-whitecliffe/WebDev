<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Strings Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
 
<body>
    <div class="container mt-5">
        <h1>JavaScript Strings Example</h1>
        <div class="card">
            <div class="card-body">
                <h2>String Operations</h2>
                <div class="row">
                    <div class="col-md-6">
                        <h3>Concatenation</h3>
                        <p class="mb-0">Full Name: <span id="fullName"></span></p>
                    </div>
                    <div class="col-md-6">
                        <h3>Length</h3>
                        <p class="mb-0">Name Length: <span id="nameLength"></span></p>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <h3>Substring</h3>
                        <p class="mb-0">First Name: <span id="firstName"></span></p>
                    </div>
                    <div class="col-md-6">
                        <h3>Character Access</h3>
                        <p class="mb-0">Third Character: <span id="thirdChar"></span></p>
                    </div>
                    <div class="col-md-6">
                        <h3>First Character</h3>
                        <p class="mb-0">First Character: <span id="firstChar"></span></p>
                    </div>
                    <div class="col-md-6">
                        <h3>Random Character</h3>
                        <p class="mb-0">Random Character: <span id="randomChar"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <script>
        // String operations
        let firstName = "John";
        let lastName = "Doe";
        let fullName = firstName + " " + lastName;
        let nameLength = fullName.length;
        let firstChar = firstName.substring(0, 1);
        let thirdChar = fullName.substring(2, 3);
        let randomChar = fullName.substring(5, 6);
        // Update the values in the HTML
        document.getElementById("fullName").innerText = fullName;
        document.getElementById("nameLength").innerText = nameLength;
        document.getElementById("firstName").innerText = firstName;
        document.getElementById("thirdChar").innerText = thirdChar;
        document.getElementById("firstChar").innerText = firstChar;
        document.getElementById("randomChar").innerText = randomChar;
    </script>
</body>
 
</html>
