/* flex_layout.html */
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Layout Examples</title>
    <link rel="stylesheet" href="flex_layout.css">
</head>
<body>
    <h2>Three items with flex: 1;</h2>
    <div class="container scenario1">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>
 
    <h2>Two items: flex 1 and flex 2;</h2>
    <div class="container scenario2">
        <div class="item">Item 1 (flex:1)</div>
        <div class="item">Item 2 (flex:2)</div>
    </div>
 
    <h2>Two items: flex 1 and flex 3;</h2>
    <div class="container scenario3">
        <div class="item">Item 1 (flex:1)</div>
        <div class="item">Item 2 (flex:3)</div>
    </div>
</body>
</html>
