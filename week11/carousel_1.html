<!DOCTYPE html>
<html lang="en">
 
<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
 
<body>
 
    <!-- Carousel -->
    <div id="demo" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000"
    data-bs-pause="hover">
        <!-- carousel means this container is a carousel -->
        <!-- slide means that the carousel should animate the transition
            between slides, creating a smooth sliding effect as the user
            interacts with the carousel. -->
        <!-- data-bs-ride="carousel" is used to indicate that a container element
            is a carousel component and should be initialized as a carousel. The
            data-bs-ride attribute is a data attribute specific to Bootstrap 5-->
        <!-- data-bs-interval="1000" is used to specify the amount of time to delay
            between automatically cycling an item. If false, carousel will not
            automatically cycle. -->
        <!-- data-bs-pause="hover" is used to pause the carousel on mouseenter and
            resume on mouseleave. If set to false, hovering over the carousel won't
            pause it. -->
 
        <!-- Indicators/dots -->
        <div class="carousel-indicators">
            <!-- The data-bs-target attribute is used to target a specific carousel
                by id. The data-bs-slide-to attribute is used to specify which slide
                to go to. The first slide is 0, the second is 1, etc. -->
            <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
            <!-- #demo means that the button should target the carousel with id="demo" -->
            <!-- data-bs-slide-to is used to specify which slide to go to. The first slide is 0, the second is 1, etc. -->
            <!-- class="active" is used to indicate the current slide -->
        </div>
 
        <!-- The slideshow/carousel -->
        <div class="carousel-inner">
            <!-- The carousel-inner class is used to add slides to the carousel. -->
            <div class="carousel-item active">
                <!-- The carousel-item class is used to define each individual slide. -->
                <!-- active class is used to indicate the current slide. -->
                <img src="img/la.jpg" alt="Los Angeles" class="d-block" style="width:100%">
                <!-- d-block class is used to make the image responsive to the screen size. -->
                <!-- d-block means that the image should be a block element. -->
                <div class="carousel-caption">
                    <h3>Los Angeles</h3>
                    <p>We had such a great time in LA!</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="img/tudor-baciu-IcqIsNwe1PU-unsplash.jpg" alt="Chicago" class="d-block" style="width:100%">
                <div class="carousel-caption">
                    <h3>Chicago</h3>
                    <p>Thank you, Chicago!</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="img/ny.jpg" alt="New York" class="d-block" style="width:100%">
                <div class="carousel-caption">
                    <h3>New York</h3>
                    <p>We love the Big Apple!</p>
                  </div>
            </div>
        </div>
 
        <!-- Left and right controls/icons -->
        <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
 
    <div class="container-fluid mt-3">
        <h3>Carousel Example</h3>
        <p>The following example shows how to create a basic carousel with indicators and controls.</p>
    </div>
 
</body>
 
</html>
