<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-sm-3 p-3 text-white">
                <img src="img/paris.jpg" alt="Paris" class="img-fluid rounded" height="250px" width="250px">
            </div>
            <div class="col-sm-3 p-3 text-white">
                <img src="img/la.jpg" alt="Los Angeles" class="img-fluid rounded" height="250px" width="250px">
            </div>
            <div class="col-sm-3 p-3 text-white">
                <img src="img/newyork.jpg" alt="New York" class="img-fluid rounded-circle" height="250px" width="250px">
            </div>
            <div class="col-sm-3 p-3 text-white">
                <img src="img/sanfran.jpg" alt="San Francisco" class="img-fluid img-thumbnail" height="250px" width="250px">
            </div>
        </div>
    </div>

    <div class="img-fluid mb-4">
        <img src="img/paris.jpg" class="rounded-circle" alt="Paris" height="250px" width="250px">
    </div>
    <div class="img-fluid mb-4">
        <img src="img/la.jpg" class="rounded" alt="Los Angeles" height="250px" width="250px">
    </div>
    <div class="img-fluid mb-4">
        <img src="img/newyork.jpg" class="img-thumbnail" alt="New York" height="250px" width="250px">
    </div>

    <div class="container mt-3">
        <h2>Aligning images</h2>
        <p>Use the float classes to float the image to the left or to the right:</p>
        <img src="img/paris.jpg" class="float-start" alt="Paris" width="304" height="236">
        <img src="img/paris.jpg" class="float-end" alt="Paris" width="304" height="236">
    </div>

    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="img/la.jpg" alt="Los Angeles" class="d-block" style="width:100%">
            <div class="carousel-caption">
                <h3>Los Angeles</h3>
                <p>We had such a great time in LA!</p>
            </div>
        </div>
        <div class="carousel-item">
            <img src="img/tudor-baciu-IcqIsNwe1PU-unsplash.jpg" alt="Chicago" class="d-block" style="width:100%">
            <div class="carousel-caption">
                <h3>Chicago</h3>
                <p>Thank you, Chicago!</p>
            </div>
        </div>
        <div class="carousel-item">
            <img src="img/ny.jpg" alt="New York" class="d-block" style="width:100%">
            <div class="carousel-caption">
                <h3>New York</h3>
                <p>We love the Big Apple!</p>
            </div>
        </div>
        <div class="carousel-item">
            <img src="img/sanfran.jpg" alt="San Francisco" class="d-block" style="width:100%">
            <div class="carousel-caption">
                <h3>San Francisco</h3>
                <p>Thank you, San Francisco!</p>
            </div>
        </div>
        <div class="carousel-item">
            <img src="img/paris.jpg" alt="Paris" class="d-block" style="width:100%">
            <div class="carousel-caption">
                <h3>Paris</h3>
                <p>We had such a great time in Paris!</p>
            </div>
        </div>
    </div>
</body>

</html>
